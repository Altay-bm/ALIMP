{% extends 'base.html' %}
{% block content %}
  <h2>Отчёты</h2>
  <h3>Статистика по статусам</h3>
  <ul>
    {% for k,v in stats.items() %}
      <li>{{ k }}: {{ v }}</li>
    {% endfor %}
  </ul>
  <h3>Сумма отгруженных заявок за месяц</h3>
  <form method="post" action="/reports">
    <input name="year" type="number" value="{{ year or '' }}" placeholder="Год">
    <input name="month" type="number" value="{{ month or '' }}" placeholder="Месяц">
    <button type="submit">Показать</button>
  </form>
  {% if total is defined %}
    <p>Итого за {{ month }}.{{ year }}: {{ total }}</p>
  {% endif %}
{% endblock %}
