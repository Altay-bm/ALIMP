{% extends 'base.html' %}
{% block content %}
  <div class="login-wrapper">
    <div class="login-card card">
      <h2 style="margin-top:0;">Вход в систему</h2>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="/login" class="form-grid">
        <div class="form-row"><label class="form-label">Логин</label><input class="form-control" name="username" required></div>
        <div class="form-row"><label class="form-label">Пароль</label><input class="form-control" name="password" type="password" required></div>
        <div class="form-row"><div style="margin-left:auto"><button class="btn" type="submit">Войти</button></div></div>
      </form>
      <p style="margin-top:12px; color:var(--muted); font-size:13px">Тестовые учётки: manager/man123, engineer/eng123, admin/admin123</p>
    </div>
  </div>
{% endblock %}
